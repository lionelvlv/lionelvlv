coding my portfollio after leaving vibecode hell.
like, I have a berkeley CS degree, so I should be able to program while actually using my brain right?
it's so stupid that you can code soulless websites with Claude. doing something like that is something i would never be proud about

fuck I gotta study for my midterm and do my job applications. nah i feel like this is more important.

for this portfollio website, i will build it with my hands. Fuck AI. 

also i'm learning how to use VIM, so i'll probably in the spirit of feeling old, program in VIM. it's pretty neat.

:w write
:q quit
:wq save and quit
:q! don't save and quit
number then gg goes to that line number
f followed by a character finds the first instance of that character
e jumps to end of word
w jumps to start of word
cw to replace word

ALT + U to undo
CTRL + R to redo

click i to insert
esc to go back

dd to delete an entire line
3 dd to delete 3 lines

/ to search something i.e. /potato looks for potato
next character lowercase n, shift N searches backwards

%s/<replace>/<text-to-replace-with>/g?c? g and c are optional, g is for global, c is for confirm
%s/potato/brotato/gc

there's a lot of more efficient things to do with VIM! that's cool.

i'm doing this to find a passion for programming again. i am a computer science major but the job market is cooked, and i don't enjoy programming.
my goal is to enjoy it again.
