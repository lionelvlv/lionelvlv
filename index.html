also i'm learning how to use VIM, so i'll probably in the spirit of feeling old, program in VIM. it's pretty neat.

:w write
:q quit
:wq save and quit
:q! don't save and quit

ALT + U to undo
CTRL + R to redo

click i to insert
esc to go back

dd to delete an entire line
3 dd to delete 3 lines

/ to search something i.e. /potato looks for potato
next character lowercase n, shift N searches backwards

%s/<replace>/<text-to-replace-with>/g?c? g and c are optional, g is for global, c is for confirm
%s/potato/brotato/gc

there's a lot of more efficient things to do with VIM! that's cool.

i'm doing this to find a passion for programming again. i am a computer science major but the job market is cooked, and i don't enjoy programming.
my goal is to enjoy it again.
